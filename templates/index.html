<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Telegram Post Catalog</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f1221; color: #e6e9f5; }
    .wrap { max-width: 1300px; margin: 0 auto; padding: 20px; }
    .card { background: #171a2e; border: 1px solid #2b3155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    h1 { margin: 0 0 6px; font-size: 24px; }
    p { margin: 0 0 10px; color: #adb4d8; }
    label { display: block; margin-bottom: 6px; color: #b9c0e3; font-size: 13px; }
    input, textarea, button { border-radius: 10px; border: 1px solid #2b3155; background: #0d1020; color: #e6e9f5; }
    textarea, input { width: 100%; padding: 10px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: 1fr 180px 240px; gap: 10px; align-items: end; }
    .btn { padding: 10px 12px; cursor: pointer; }
    .btn.primary { background: #3a63ff; border-color: #3a63ff; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill { background: #232949; border: 1px solid #333b67; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #2b3155; padding: 8px; vertical-align: top; }
    th { cursor: pointer; text-align: left; color: #b9c0e3; position: sticky; top: 0; background: #171a2e; }
    .table-wrap { max-height: 65vh; overflow: auto; border: 1px solid #2b3155; border-radius: 10px; }
    .preview { width: 70px; border-radius: 6px; border: 1px solid #2b3155; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Telegram Channel Post Catalog</h1>
      <p>Connect with your own Telegram account via environment variables: <span class="mono">TELEGRAM_API_ID</span>, <span class="mono">TELEGRAM_API_HASH</span>, and <span class="mono">TELEGRAM_STRING_SESSION</span>.</p>
      <div id="configStatus" class="row"></div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label>Channels/Usernames/Links (one per line)</label>
          <textarea id="channels" rows="4" placeholder="@durov\nhttps://t.me/example_channel"></textarea>
        </div>
        <div>
          <label>Posts per channel</label>
          <input id="limit" type="number" min="1" max="1000" value="100" />
        </div>
        <div>
          <label>Actions</label>
          <div class="row">
            <button class="btn primary" id="scrapeBtn">Scrape Posts</button>
            <button class="btn" id="csvBtn">Export CSV</button>
          </div>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <input id="filterText" placeholder="Filter by channel/text/media type..." />
      </div>
    </div>

    <div class="card">
      <div id="summary" class="row"></div>
      <div class="table-wrap" style="margin-top:10px;">
        <table>
          <thead>
            <tr>
              <th data-sort="timestamp_utc">Timestamp</th>
              <th data-sort="channel">Channel</th>
              <th data-sort="post_id">Post ID</th>
              <th data-sort="media_type">Media</th>
              <th>Image</th>
              <th data-sort="text_length">Text</th>
              <th data-sort="word_count">Words</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  const configStatusEl = document.getElementById('configStatus');
  const summaryEl = document.getElementById('summary');
  const rowsEl = document.getElementById('rows');
  const filterTextEl = document.getElementById('filterText');

  let records = [];
  let sortBy = 'timestamp_utc';
  let sortDir = 'desc';

  async function loadConfigStatus() {
    const res = await fetch('/api/telegram/config');
    const data = await res.json();
    configStatusEl.innerHTML = `
      <span class="pill">API ID: ${data.api_id_set ? 'set' : 'missing'}</span>
      <span class="pill">API HASH: ${data.api_hash_set ? 'set' : 'missing'}</span>
      <span class="pill">STRING SESSION: ${data.string_session_set ? 'set' : 'missing'}</span>
    `;
  }

  function getPayload() {
    const channels = document.getElementById('channels').value.split('\n').map(s => s.trim()).filter(Boolean);
    const limit = Number(document.getElementById('limit').value || 100);
    return { channels, limit_per_channel: limit, include_image_data: true };
  }

  function renderSummary() {
    const withImages = records.filter(r => r.has_image).length;
    const uniqueChannels = new Set(records.map(r => r.channel)).size;
    summaryEl.innerHTML = `
      <span class="pill">Posts: ${records.length}</span>
      <span class="pill">Channels: ${uniqueChannels}</span>
      <span class="pill">With Images: ${withImages}</span>
    `;
  }

  function renderRows() {
    const q = filterTextEl.value.trim().toLowerCase();
    const filtered = records.filter(r => {
      if (!q) return true;
      return [r.channel, r.text, r.media_type, String(r.post_id)].join(' ').toLowerCase().includes(q);
    });

    filtered.sort((a, b) => {
      const av = a[sortBy] ?? '';
      const bv = b[sortBy] ?? '';
      if (typeof av === 'number' && typeof bv === 'number') return sortDir === 'asc' ? av - bv : bv - av;
      return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });

    rowsEl.innerHTML = filtered.map(r => `
      <tr>
        <td class="mono">${r.timestamp_utc}</td>
        <td>${r.channel}</td>
        <td>${r.post_id}</td>
        <td>${r.media_type}</td>
        <td>${r.image_base64 ? `<img class="preview" src="${r.image_base64}" alt="preview"/>` : ''}</td>
        <td>${(r.text || '').replace(/</g, '&lt;').slice(0, 280)}</td>
        <td>${r.word_count}</td>
      </tr>
    `).join('');
  }

  async function scrape() {
    const payload = getPayload();
    const res = await fetch('/api/telegram/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.detail || 'Scrape failed');
      return;
    }
    records = data.records || [];
    renderSummary();
    renderRows();
  }

  async function exportCsv() {
    const payload = getPayload();
    const res = await fetch('/api/telegram/export.csv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const data = await res.json();
      alert(data.detail || 'CSV export failed');
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'telegram-posts.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById('scrapeBtn').onclick = scrape;
  document.getElementById('csvBtn').onclick = exportCsv;
  filterTextEl.addEventListener('input', renderRows);

  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortBy === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortBy = key; sortDir = 'asc'; }
      renderRows();
    });
  });

  loadConfigStatus();
</script>
</body>
</html>
